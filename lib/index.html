<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular-Buffer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Circular Buffer Visualizer</h2>
    <div id="status-msg">Buffer Empty</div>

    <div class="controls">
        <input type="text" id="dataInput" placeholder="Data..." style="padding: 10px;">
        <button class="btn-add" onclick="enqueue()">Write (Overwrite)</button>
        <button class="btn-read" onclick="dequeue()">Read (Remove)</button>
    </div>

    <div class="buffer-ring" id="ring">
        </div>

    
<script src="index.js"></script>    
</body>
</html>
