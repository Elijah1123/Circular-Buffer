<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular-Buffer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h3>Circular Buffer (Limit: 3)</h3>
    <p>New items will overwrite the oldest slot.</p>
    <input type="text" id="bufferInput" placeholder="Item...">
    <button onclick="addToBuffer()">Add</button>
    
    <div class="buffer-container" id="bufferDisplay">
        <div class="slot" id="s0">-</div>
        <div class="slot" id="s1">-</div>
        <div class="slot" id="s2">-</div>
    </div>

    
<script src="index.js"></script>    
</body>
</html>
